<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>职信通 - 信用报告（失败）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #f6f8fc;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .phone {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: #f6f8fc;
    position: relative;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f2460 0%, #1e40af 50%, #2563eb 100%);
    padding: 52px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.72);
    position: relative;
    z-index: 1;
  }

  .content {
    padding: 0 16px 16px;
    margin-top: -12px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.07);
    margin-bottom: 14px;
  }

  /* Failed card */
  .failed-card {
    padding: 44px 24px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .failed-icon-wrap {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fee2e2, #fecaca);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 22px;
    position: relative;
  }
  .failed-icon-wrap::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: rgba(239,68,68,0.08);
  }
  .failed-title {
    font-size: 20px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 10px;
  }
  .failed-desc {
    font-size: 14px;
    color: #64748b;
    line-height: 1.7;
    margin-bottom: 12px;
  }

  /* Error detail box */
  .error-box {
    background: #fff5f5;
    border: 1px solid #fecaca;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 28px;
    width: 100%;
  }
  .error-box-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .error-box-text {
    font-size: 12px;
    color: #dc2626;
    line-height: 1.5;
    text-align: left;
  }

  /* Report number */
  .report-number {
    font-size: 11px;
    color: #94a3b8;
    margin-bottom: 24px;
    font-family: 'SF Mono', monospace;
  }

  .btn-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 52px;
    background: linear-gradient(135deg, #1e40af, #2563eb);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
    margin-bottom: 14px;
  }
  .btn-primary:active { opacity: 0.88; }

  .price-tag {
    background: rgba(255,255,255,0.22);
    border-radius: 8px;
    padding: 2px 8px;
    font-size: 13px;
    font-weight: 700;
  }

  .btn-secondary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    height: 44px;
    background: transparent;
    color: #64748b;
    font-size: 14px;
    font-weight: 500;
    border: 1.5px solid #e2e8f0;
    border-radius: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.12s;
  }
  .btn-secondary:active { background: #f8fafc; }

  /* Support row */
  .support-card {
    padding: 0;
    overflow: hidden;
  }
  .support-row {
    display: flex;
    align-items: center;
    padding: 18px 20px;
    gap: 14px;
    text-decoration: none;
  }
  .support-icon {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* Tab Bar */
  .tabbar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 390px;
    background: #fff;
    border-top: 1px solid #f1f5f9;
    display: flex;
    padding: 8px 0 20px;
    z-index: 100;
    box-shadow: 0 -2px 12px rgba(0,0,0,.06);
  }
  .tab-item {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    cursor: pointer; text-decoration: none;
  }
  .tab-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .tab-label { font-size: 10px; font-weight: 500; color: #94a3b8; }
  .tab-item.active .tab-label { color: #2563eb; }
  .tab-item.active .tab-icon svg { stroke: #2563eb; }
  .tab-item .tab-icon svg { stroke: #94a3b8; }
</style>
</head>
<body>
<div class="phone">

  <!-- Header -->
  <div class="header">
    <div class="header-title">职业信用报告</div>
    <div class="header-sub">真实、权威、可信的职业信用凭证</div>
  </div>

  <!-- Content -->
  <div class="content">

    <div class="card failed-card">
      <!-- Failed icon -->
      <div class="failed-icon-wrap">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>

      <div class="failed-title">报告生成失败</div>
      <div class="failed-desc">请重新提交信息或联系客服</div>

      <!-- Error detail -->
      <div class="error-box">
        <div class="error-box-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <div class="error-box-text">身份信息核实失败，请确认填写信息与证件一致</div>
        </div>
      </div>

      <div class="report-number">报告编号：CR20260403002</div>

      <!-- Retry button -->
      <a href="09-payment.html" class="btn-primary">
        重新生成
        <span class="price-tag">¥50</span>
      </a>

      <!-- Contact support button -->
      <a href="#" class="btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        联系客服
      </a>
    </div>

    <!-- Support tips -->
    <div class="card support-card">
      <div class="support-row">
        <div class="support-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:600;color:#0f172a;margin-bottom:4px;">常见失败原因</div>
          <div style="font-size:12px;color:#94a3b8;line-height:1.6;">
            信息填写有误 · 证件过期失效<br>
            材料不完整 · 系统临时异常
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Tab Bar -->
  <div class="tabbar">
    <a href="03-home-empty.html" class="tab-item">
      <div class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <span class="tab-label">首页</span>
    </a>
    <a href="08-report-failed.html" class="tab-item active">
      <div class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <span class="tab-label">信用报告</span>
    </a>
    <a href="12-resume-empty.html" class="tab-item">
      <div class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 9h6M9 12h6M9 15h4"/>
        </svg>
      </div>
      <span class="tab-label">可信简历</span>
    </a>
    <a href="19-profile.html" class="tab-item">
      <div class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <span class="tab-label">我的</span>
    </a>
  </div>

</div>
</body>
</html>
