<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>可信简历 - 有数据</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:#f6f8fc;max-width:390px;margin:0 auto}
.grad-header{background:linear-gradient(135deg,#0f2460 0%,#1e40af 50%,#2563eb 100%);padding:20px 20px 24px;position:relative;overflow:hidden}
.grad-header::after{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.07) 0%,transparent 70%);pointer-events:none}
.grad-title{font-size:22px;font-weight:800;color:#fff;display:block;line-height:1.3}
.content{padding:16px 16px 88px;display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.07)}
.card-header{padding:16px 18px 12px;border-bottom:1px solid #f8fafc;font-size:15px;font-weight:700;color:#0f172a;display:flex;align-items:center;gap:6px}
.card-sub{font-size:12px;color:#94a3b8;font-weight:400}
.card-body{padding:0}
.info-row{display:flex;align-items:flex-start;gap:16px;padding:16px 18px}
.avatar-box{width:64px;height:64px;border-radius:10px;border:1.5px dashed #d1d5db;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#94a3b8;font-size:12px}
.info-area{flex:1;display:flex;flex-direction:column;gap:8px}
.user-name{font-size:18px;font-weight:600;color:#0f172a}
.info-line{border:1.5px dashed #e2e8f0;border-radius:8px;padding:6px 10px;font-size:11px;color:#94a3b8}
.record-item{background:#f8fafc;border-radius:10px;padding:10px 12px;margin:0 18px 8px}
.record-item:last-child{margin-bottom:16px}
.record-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.record-company{font-size:13px;font-weight:600;color:#0f172a}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.badge-blue{background:#2563eb;color:#fff}
.badge-gray{background:#d1d5db;color:#fff}
.record-pos{font-size:11px;color:#64748b}
.cert-grid{display:flex;flex-wrap:wrap;gap:10px;padding:12px 18px}
.cert-tile{flex:0 0 calc(50% - 5px);background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:10px;display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.cert-name{font-size:12px;color:#374151;font-weight:500}
.cert-issuer{font-size:11px;color:#94a3b8}
.skill-item{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid #f8fafc}
.skill-item:last-child{border-bottom:none}
.skill-left{display:flex;align-items:center;gap:8px}
.skill-name{font-size:13px;color:#374151;font-weight:500}
.skill-level{font-size:11px;color:#94a3b8}
.tab-bar{display:flex;background:#fff;border-top:1px solid #f1f5f9;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 20px;text-decoration:none}
.tab-dot{width:20px;height:4px;border-radius:2px;background:#e2e8f0}
.tab-item.active .tab-dot{background:#2563eb}
.tab-item span{font-size:10px;font-weight:500;color:#9ca3af}
.tab-item.active span{color:#2563eb;font-weight:600}
</style>
</head>
<body>
<div class="grad-header"><span class="grad-title">可信简历</span></div>
<div class="content">
  <!-- 基本信息 -->
  <div class="card">
    <div class="info-row">
      <div class="avatar-box">头像</div>
      <div class="info-area">
        <div class="user-name">张三</div>
        <div class="info-line">男 &nbsp;·&nbsp; 28岁 &nbsp;·&nbsp; 138****8888</div>
      </div>
    </div>
  </div>

  <!-- 工作记录 -->
  <div class="card">
    <div class="card-header">工作记录</div>
    <div class="card-body">
      <div class="record-item">
        <div class="record-top"><span class="record-company">某科技有限公司</span><span class="badge badge-blue">已认证</span></div>
        <div class="record-pos">产品经理 &nbsp;|&nbsp; 2022.03 - 至今</div>
      </div>
      <div class="record-item">
        <div class="record-top"><span class="record-company">某互联网公司</span><span class="badge badge-gray">待认证</span></div>
        <div class="record-pos">产品专员 &nbsp;|&nbsp; 2020.06 - 2022.02</div>
      </div>
    </div>
  </div>

  <!-- 学历 -->
  <div class="card">
    <div class="card-header">学历学籍</div>
    <div class="card-body">
      <div class="record-item">
        <div class="record-top"><span class="record-company">某某大学 &nbsp;|&nbsp; 本科</span><span class="badge badge-blue">已认证</span></div>
        <div class="record-pos">计算机科学与技术 &nbsp;|&nbsp; 2016.09 - 2020.06</div>
      </div>
    </div>
  </div>

  <!-- 证书 -->
  <div class="card">
    <div class="card-header">技能证书 <span class="card-sub">| 2个</span></div>
    <div class="cert-grid">
      <div class="cert-tile"><span class="badge badge-blue" style="margin-bottom:4px">已认证</span><span class="cert-name">PMP 项目管理专业人士</span><span class="cert-issuer">PMI</span></div>
      <div class="cert-tile"><span class="badge badge-gray" style="margin-bottom:4px">待认证</span><span class="cert-name">产品经理认证 NPDP</span><span class="cert-issuer">PDMA</span></div>
    </div>
  </div>

  <!-- 技能 -->
  <div class="card">
    <div class="card-header">职业技能</div>
    <div class="card-body">
      <div class="skill-item"><div class="skill-left"><span class="skill-name">产品设计</span><span class="skill-level">熟练</span></div><span class="badge badge-blue">已认证</span></div>
      <div class="skill-item"><div class="skill-left"><span class="skill-name">数据分析</span><span class="skill-level">熟练</span></div><span class="badge badge-gray">待认证</span></div>
    </div>
  </div>
</div>
<nav class="tab-bar">
  <a class="tab-item" href="03-home-empty.html"><div class="tab-dot"></div><span>首页</span></a>

</nav>
</body>
</html>
