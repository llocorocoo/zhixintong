<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>职信通 - 信用报告（核查中）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #f6f8fc;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .phone {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: #f6f8fc;
    position: relative;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f2460 0%, #1e40af 50%, #2563eb 100%);
    padding: 52px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.72);
    position: relative;
    z-index: 1;
  }

  .content {
    padding: 0 16px 16px;
    margin-top: -12px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.07);
    margin-bottom: 14px;
    padding: 20px;
  }

  /* Card header row */
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .card-header-icon {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, #dbeafe, #bfdbfe);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-header-info { flex: 1; }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 3px;
  }
  .card-number {
    font-size: 11px;
    color: #94a3b8;
    font-family: 'SF Mono', monospace;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge.blue {
    background: linear-gradient(135deg, #dbeafe, #bfdbfe);
    color: #1d4ed8;
    border: 1.5px solid #bfdbfe;
  }
  .badge.green {
    background: linear-gradient(135deg, #dcfce7, #bbf7d0);
    color: #15803d;
    border: 1.5px solid #bbf7d0;
  }
  .badge.red {
    background: linear-gradient(135deg, #fee2e2, #fecaca);
    color: #dc2626;
    border: 1.5px solid #fecaca;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 24px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #64748b;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .progress-track {
    width: 100%;
    height: 6px;
    background: #e2e8f0;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #1e40af, #2563eb, #60a5fa);
    border-radius: 3px;
    width: 50%;
    position: relative;
    overflow: hidden;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; right: -100%;
    width: 60px; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    animation: shimmer 1.8s infinite;
  }
  @keyframes shimmer {
    0% { right: 100%; }
    100% { right: -60px; }
  }

  /* Timeline */
  .timeline { padding: 4px 0; }
  .timeline-step {
    display: flex;
    gap: 14px;
    position: relative;
  }
  .timeline-step + .timeline-step { margin-top: 0; }
  .timeline-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }
  .timeline-circle {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .timeline-circle.done {
    background: linear-gradient(135deg, #059669, #34d399);
    color: #fff;
  }
  .timeline-circle.pending {
    background: #e2e8f0;
    color: #94a3b8;
  }
  .timeline-circle.active {
    background: linear-gradient(135deg, #1e40af, #2563eb);
    color: #fff;
    box-shadow: 0 0 0 4px rgba(37,99,235,0.15);
  }
  .timeline-line {
    width: 2px;
    flex: 1;
    min-height: 28px;
    background: #e2e8f0;
    margin: 2px 0;
  }
  .timeline-line.done { background: linear-gradient(180deg, #34d399, #e2e8f0); }
  .timeline-content {
    padding: 4px 0 28px;
    flex: 1;
  }
  .timeline-step:last-child .timeline-content { padding-bottom: 4px; }
  .timeline-name {
    font-size: 14px;
    font-weight: 600;
    color: #0f172a;
    margin-bottom: 3px;
  }
  .timeline-name.pending { color: #94a3b8; }
  .timeline-status {
    font-size: 12px;
    color: #94a3b8;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .timeline-status.done { color: #059669; }
  .timeline-status.pending-txt { color: #94a3b8; }

  /* Info box */
  .info-box {
    background: linear-gradient(135deg, #eff6ff, #dbeafe);
    border: 1px solid #bfdbfe;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-top: 4px;
  }
  .info-box-icon { flex-shrink: 0; margin-top: 1px; }
  .info-box-text {
    font-size: 13px;
    color: #1e40af;
    font-weight: 500;
    line-height: 1.5;
  }

  /* Tab Bar */
  .tabbar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 390px;
    background: #fff;
    border-top: 1px solid #f1f5f9;
    display: flex;
    padding: 8px 0 20px;
    z-index: 100;
    box-shadow: 0 -2px 12px rgba(0,0,0,.06);
  }
  .tab-item {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    cursor: pointer; text-decoration: none;
  }
  .tab-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .tab-label { font-size: 10px; font-weight: 500; color: #94a3b8; }
  .tab-item.active .tab-label { color: #2563eb; }
  .tab-item.active .tab-icon svg { stroke: #2563eb; }
  .tab-item .tab-icon svg { stroke: #94a3b8; }
</style>
</head>
<body>
<div class="phone">

      <!-- Timeline -->
      <div class="timeline">

              </svg>
              核实中…
            </div>
          </div>
        </div>

        <!-- Step 3: pending -->
        <div class="timeline-step">
          <div class="timeline-left">
            <div class="timeline-circle pending">3</div>
          </div>
          <div class="timeline-content" style="padding-bottom:4px;">
            <div class="timeline-name pending">职业资格核实</div>
            <div class="timeline-status pending-txt">等待中</div>
          </div>
        </div>
      </div>

      <!-- Info box -->
      <div class="info-box">
        <div class="info-box-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div class="info-box-text">预计 1-3 个工作日完成核查，完成后将通知您查看报告</div>
      </div>
    </div>

    <!-- Sample report link -->
    <div class="card" style="padding:0;">
      <a href="18-sample-report.html" style="display:flex;align-items:center;padding:18px 20px;gap:14px;text-decoration:none;">
        <div style="width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#ede9fe,#ddd6fe);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          <div style="font-size:12px;color:#94a3b8;">了解信用报告内容与格式</div>
        </div>
        <div style="width:28px;height:28px;background:#f1f5f9;border-radius:50%;display:flex;align-items:center;justify-content:center;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>

    </div>

  </div>

  <!-- Tab Bar -->
  <div class="tabbar">
    <a href="03-home-empty.html" class="tab-item">

    <a href="12-resume-empty.html" class="tab-item">

    <a href="19-profile.html" class="tab-item">

</div>
