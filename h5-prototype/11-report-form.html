<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>填写信息</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #f6f8fc;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: #f6f8fc;
    display: flex;
    flex-direction: column;
  }

  /* Nav */
  .nav-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    padding: 44px 16px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 1px 0 rgba(0,0,0,.06);
  }
  .nav-back {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 10px; flex-shrink: 0;
  }
  .nav-back:active { background: #f1f5f9; }
  .nav-title {
    flex: 1; text-align: center;
    font-size: 17px; font-weight: 600; color: #0f172a;
    margin-right: 36px;
  }

  /* Scroll */
  .scroll-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 120px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Step bar */
  .step-bar {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.07);
    padding: 18px 20px;
    display: flex;
    align-items: center;
  }
  .step-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
  }
  .step-item:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 18px;
    left: calc(50% + 18px);
    right: calc(-50% + 18px);
    height: 2px;
    background: #e2e8f0;
    z-index: 0;
  }
  .step-item.active:not(:last-child)::after,
  .step-item.done:not(:last-child)::after {
    background: #2563eb;
  }
  .step-circle {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #f1f5f9;
    border: 2px solid #e2e8f0;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    z-index: 1;
    transition: background .2s, border-color .2s;
  }
  .step-item.active .step-circle {
    background: linear-gradient(135deg, #1e40af, #2563eb);
    border-color: #1e40af;
  }
  .step-item.done .step-circle {
    background: #2563eb;
    border-color: #2563eb;
  }
  .step-label {
    font-size: 11px;
    color: #94a3b8;
    font-weight: 500;
    white-space: nowrap;
  }
  .step-item.active .step-label { color: #2563eb; font-weight: 700; }
  .step-item.done .step-label { color: #2563eb; }

  /* Form card */
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.07);
    padding: 20px;
  }
  .form-step { display: none; }
  .form-step.active { display: block; }
  .form-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .form-step-title {
    font-size: 16px;
    font-weight: 700;
    color: #0f172a;
  }
  .skip-link {
    font-size: 13px;
    color: #2563eb;
    cursor: pointer;
    text-decoration: none;
  }

  /* Field */
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .required { color: #ef4444; }
  .field-input {
    width: 100%;
    height: 48px;
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    padding: 0 14px;
    font-size: 15px;
    color: #0f172a;
    font-family: inherit;
    outline: none;
    transition: border-color .2s, background .2s;
    -webkit-appearance: none;
  }
  .field-input:focus {
    border-color: #2563eb;
    background: #eff6ff;
  }
  .field-input::placeholder { color: #94a3b8; }
  select.field-input { cursor: pointer; }

  /* Upload button */
  .upload-btn {
    width: 100%;
    height: 48px;
    background: #f8fafc;
    border: 1.5px dashed #cbd5e1;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    font-size: 14px;
    color: #64748b;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .upload-btn:active { border-color: #2563eb; background: #eff6ff; }

  /* Tip row */
  .tip-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fffbeb;
    border-radius: 12px;
    padding: 11px 14px;
    border: 1px solid #fde68a;
  }
  .tip-row span {
    font-size: 12px;
    color: #92400e;
    line-height: 1.5;
  }

  /* Bottom bar */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 390px;
    background: #fff;
    padding: 16px 16px 32px;
    box-shadow: 0 -1px 0 rgba(0,0,0,.06), 0 -4px 20px rgba(0,0,0,.05);
    display: flex;
    gap: 10px;
  }
  .btn-outline {
    flex: 1;
    height: 52px;
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 14px;
    color: #475569;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .btn-outline:active { background: #f1f5f9; }
  .btn-outline.hidden { display: none; }
  .btn-primary {
    flex: 2;
    height: 52px;
    background: linear-gradient(135deg, #1e40af, #2563eb);
    border-radius: 16px;
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    transition: opacity .15s;
  }
  .btn-primary:active { opacity: .88; }
</style>
</head>
<body>
<div class="app">
  <!-- Nav -->
  <div class="nav-bar">
    <div class="nav-back" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </div>
    <div class="nav-title">填写信息</div>
  </div>

  <!-- Scroll body -->
  <div class="scroll-body">

    <!-- Step bar -->
    <div class="step-bar" id="stepBar">
      <div class="step-item active" id="step-ind-1">
        <div class="step-circle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="step-label">身份信息</div>
      </div>
      <div class="step-item" id="step-ind-2">
        <div class="step-circle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c0 2 6 3 6 3s6-1 6-3v-5"/>
          </svg>
        </div>
        <div class="step-label">学历信息</div>
      </div>
      <div class="step-item" id="step-ind-3">
        <div class="step-circle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="6"/>
            <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
          </svg>
        </div>
        <div class="step-label">职业资格</div>
      </div>
    </div>

    <!-- Form card -->
    <div class="card">

      <!-- Step 1: 身份信息 -->
      <div class="form-step active" id="form-step-1">
        <div class="form-card-header">
          <div class="form-step-title">身份信息</div>
        </div>
        <div class="field">
          <div class="field-label">真实姓名 <span class="required">*</span></div>
          <input type="text" class="field-input" placeholder="请输入您的真实姓名">
        </div>
        <div class="field">
          <div class="field-label">身份证号 <span class="required">*</span></div>
          <input type="text" class="field-input" placeholder="请输入18位身份证号码" maxlength="18">
        </div>
      </div>

      <!-- Step 2: 学历信息 -->
      <div class="form-step" id="form-step-2">
        <div class="form-card-header">
          <div class="form-step-title">学历信息</div>
          <a class="skip-link" onclick="goStep(3)">跳过</a>
        </div>
        <div class="field">
          <div class="field-label">最高学历</div>
          <select class="field-input">
            <option value="" disabled selected>请选择学历</option>
            <option>高中</option>
            <option>大专</option>
            <option>本科</option>
            <option>硕士</option>
            <option>博士</option>
          </select>
        </div>
        <div class="field">
          <div class="field-label">毕业院校</div>
          <input type="text" class="field-input" placeholder="请输入毕业院校名称">
        </div>
        <div class="field">
          <div class="field-label">所学专业</div>
          <input type="text" class="field-input" placeholder="请输入所学专业名称">
        </div>
        <div class="field">
          <div class="field-label">学位证书编号</div>
          <input type="text" class="field-input" placeholder="请输入学位证书编号">
        </div>
        <div class="field">
          <div class="field-label">上传学历证书</div>
          <div class="upload-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            点击上传照片（JPG/PNG）
          </div>
        </div>
      </div>

      <!-- Step 3: 职业资格 -->
      <div class="form-step" id="form-step-3">
        <div class="form-card-header">
          <div class="form-step-title">职业资格证书</div>
          <a class="skip-link" onclick="submitForm()">跳过</a>
        </div>
        <div class="field">
          <div class="field-label">证书名称</div>
          <input type="text" class="field-input" placeholder="如：PMP、软件工程师等">
        </div>
        <div class="field">
          <div class="field-label">证书编号</div>
          <input type="text" class="field-input" placeholder="请输入证书编号">
        </div>
        <div class="field">
          <div class="field-label">发证日期</div>
          <input type="date" class="field-input">
        </div>
        <div class="field">
          <div class="field-label">上传证书照片</div>
          <div class="upload-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            点击上传照片（JPG/PNG）
          </div>
        </div>
      </div>

    </div>

    <!-- Tip row -->
    <div class="tip-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>带 <strong>*</strong> 为必填项，其余信息可跳过，填写越完整信用评分越准确</span>
    </div>

  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <button class="btn-outline hidden" id="prevBtn" onclick="prevStep()">上一步</button>
    <button class="btn-primary" id="nextBtn" onclick="nextStep()">下一步</button>
  </div>
</div>

<script>
var currentStep = 1;
var totalSteps = 3;

function updateUI() {
  // Update step indicators
  for (var i = 1; i <= totalSteps; i++) {
    var ind = document.getElementById('step-ind-' + i);
    var svgStroke = i < currentStep ? '#fff' : (i === currentStep ? '#fff' : '#94a3b8');
    ind.className = 'step-item' + (i === currentStep ? ' active' : '') + (i < currentStep ? ' done' : '');
    // Update SVG stroke
    var svg = ind.querySelector('svg');
    if (svg) {
      svg.setAttribute('stroke', svgStroke);
      svg.querySelectorAll('path,circle,line,polyline').forEach(function(el) {
        el.setAttribute('stroke', svgStroke);
      });
    }
  }
  // Update form steps
  for (var j = 1; j <= totalSteps; j++) {
    var fs = document.getElementById('form-step-' + j);
    fs.className = 'form-step' + (j === currentStep ? ' active' : '');
  }
  // Update buttons
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  if (currentStep === 1) {
    prevBtn.classList.add('hidden');
  } else {
    prevBtn.classList.remove('hidden');
  }
  if (currentStep === totalSteps) {
    nextBtn.textContent = '提交信息';
    nextBtn.onclick = submitForm;
  } else {
    nextBtn.textContent = '下一步';
    nextBtn.onclick = nextStep;
  }
}

function goStep(n) {
  currentStep = n;
  updateUI();
}

function nextStep() {
  if (currentStep < totalSteps) {
    currentStep++;
    updateUI();
  }
}

function prevStep() {
  if (currentStep > 1) {
    currentStep--;
    updateUI();
  }
}

function submitForm() {
  window.location.href = '06-report-processing.html';
}
</script>
</body>
</html>
