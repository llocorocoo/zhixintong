<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>职信通 - 信用报告（已完成）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #f6f8fc;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .phone {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: #f6f8fc;
    position: relative;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f2460 0%, #1e40af 50%, #2563eb 100%);
    padding: 52px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.72);
    position: relative;
    z-index: 1;
  }

  .content {
    padding: 0 16px 16px;
    margin-top: -12px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.07);
    margin-bottom: 14px;
    padding: 20px;
  }

  /* Card header */
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .card-header-icon {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, #dcfce7, #bbf7d0);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-header-info { flex: 1; }
  .card-title { font-size: 16px; font-weight: 700; color: #0f172a; margin-bottom: 3px; }
  .card-meta { font-size: 11px; color: #94a3b8; font-family: 'SF Mono', monospace; }

  .badge-green {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    background: linear-gradient(135deg, #dcfce7, #bbf7d0);
    color: #15803d;
    border: 1.5px solid #bbf7d0;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: #f1f5f9;
    margin: 16px 0;
  }

  /* Score summary in done state */
  .score-summary {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
    border-radius: 14px;
    margin-bottom: 20px;
    border: 1px solid #bae6fd;
  }
  .score-summary-num {
    font-size: 36px;
    font-weight: 800;
    color: #0369a1;
    line-height: 1;
  }
  .score-summary-info { flex: 1; }
  .score-summary-level {
    font-size: 14px;
    font-weight: 700;
    color: #0369a1;
    margin-bottom: 2px;
  }
  .score-summary-max { font-size: 12px; color: #7dd3fc; }

  /* Action buttons row */
  .action-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .btn-preview {
    flex: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    height: 44px;
    background: linear-gradient(135deg, #1e40af, #2563eb);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .btn-preview:active { opacity: 0.88; }
  .btn-outline {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 44px;
    background: #f8fafc;
    color: #475569;
    font-size: 11px;
    font-weight: 600;
    border: 1.5px solid #e2e8f0;
    border-radius: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.12s;
  }
  .btn-outline:active { background: #f1f5f9; }

  /* Actions section */
  .actions-section {
    background: #f8fafc;
    border-radius: 14px;
    overflow: hidden;
  }
  .action-row-item {
    display: flex;
    align-items: center;
    padding: 16px;
    gap: 12px;
    cursor: pointer;
    text-decoration: none;
  }
  .action-row-item:active { background: #f1f5f9; }
  .action-row-divider { height: 1px; background: #e2e8f0; margin: 0 16px; }
  .action-row-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .action-row-text { flex: 1; }
  .action-row-title { font-size: 14px; font-weight: 600; color: #475569; }
  .action-row-desc { font-size: 11px; color: #94a3b8; margin-top: 1px; }
  .action-row-badge {
    font-size: 12px;
    font-weight: 700;
    color: #2563eb;
  }
  .action-row-badge.free {
    font-size: 12px;
    font-weight: 700;
    color: #059669;
  }
  .action-row-arrow {
    color: #cbd5e1;
  }

  /* Sample report */
  .sample-row {
    display: flex;
    align-items: center;
    padding: 18px 20px;
    gap: 14px;
    text-decoration: none;
  }
  .sample-icon {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, #ede9fe, #ddd6fe);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* Tab Bar */
  .tabbar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 390px;
    background: #fff;
    border-top: 1px solid #f1f5f9;
    display: flex;
    padding: 8px 0 20px;
    z-index: 100;
    box-shadow: 0 -2px 12px rgba(0,0,0,.06);
  }
  .tab-item {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    cursor: pointer; text-decoration: none;
  }
  .tab-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .tab-label { font-size: 10px; font-weight: 500; color: #94a3b8; }
  .tab-item.active .tab-label { color: #2563eb; }
  .tab-item.active .tab-icon svg { stroke: #2563eb; }
  .tab-item .tab-icon svg { stroke: #94a3b8; }
</style>
</head>
