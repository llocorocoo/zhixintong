<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>职信通 - 首页（有评分）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #f6f8fc;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .phone {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: #f6f8fc;
    position: relative;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f2460 0%, #1e40af 50%, #2563eb 100%);
    padding: 52px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header-greeting {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.72);
    position: relative;
    z-index: 1;
  }

  .content {
    padding: 0 16px 16px;
    margin-top: -12px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.07);
    overflow: hidden;
    margin-bottom: 14px;
  }

  /* Score Card */
  .score-card {
    padding: 24px 24px 20px;
  }
  .score-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .score-label {
    font-size: 12px;
    color: #94a3b8;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .score-badge {
    background: linear-gradient(135deg, #dbeafe, #bfdbfe);
    color: #1d4ed8;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1.5px solid #bfdbfe;
  }
  .score-main {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    margin-bottom: 20px;
  }
  .score-number {
    font-size: 72px;
    font-weight: 800;
    color: #0f172a;
    line-height: 1;
    letter-spacing: -2px;
  }
  .score-max {
    font-size: 16px;
    color: #94a3b8;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .score-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 0;
  }
  .btn-primary {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    height: 44px;
    background: linear-gradient(135deg, #1e40af, #2563eb);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.88; }

  /* Expand detail */
  .expand-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 14px 0 4px;
    cursor: pointer;
    color: #64748b;
    font-size: 13px;
    font-weight: 500;
    border-top: 1px solid #f1f5f9;
    margin-top: 16px;
  }
  .expand-row .chevron {
    transition: transform 0.25s;
  }
  .expand-row.open .chevron {
    transform: rotate(180deg);
  }

  /* Detail panel */
  .detail-panel {
    display: none;
    padding: 0 4px 4px;
  }
  .detail-panel.open { display: block; }

  /* Tab switcher */
  .tab-switch {
    display: flex;
    background: #f1f5f9;
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 18px;
  }
  .tab-switch-btn {
    flex: 1;
    height: 32px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: #64748b;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }
  .tab-switch-btn.active {
    background: #fff;
    color: #1e40af;
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }

  /* Score bars */
  .score-bars { padding: 0 2px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .bar-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .bar-name {
    font-size: 13px;
    color: #475569;
    font-weight: 500;
    width: 44px;
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    height: 6px;
    background: #f1f5f9;
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
  }
  .bar-num {
    font-size: 13px;
    font-weight: 700;
    color: #0f172a;
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Quick Actions */
  .quick-card { padding: 16px 20px 20px; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #64748b;
    margin-bottom: 14px;
  }
  .quick-actions {
    display: flex;
    justify-content: space-around;
  }
  .quick-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .quick-icon {
    width: 52px; height: 52px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .quick-icon.blue { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
  .quick-icon.purple { background: linear-gradient(135deg, #ede9fe, #ddd6fe); }
  .quick-icon.amber { background: linear-gradient(135deg, #fef3c7, #fde68a); }
  .quick-label { font-size: 12px; color: #475569; font-weight: 500; }

  /* Menu List */
  .menu-card { overflow: hidden; }
  .menu-item {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    gap: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.12s;
  }
  .menu-item:active { background: #f8fafc; }
  .menu-item + .menu-item { border-top: 1px solid #f1f5f9; }
  .menu-icon-wrap {
    width: 44px; height: 44px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .menu-icon-wrap.blue { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
  .menu-icon-wrap.green { background: linear-gradient(135deg, #dcfce7, #bbf7d0); }
  .menu-icon-wrap.orange { background: linear-gradient(135deg, #ffedd5, #fed7aa); }
  .menu-text { flex: 1; }
  .menu-title { font-size: 15px; font-weight: 600; color: #0f172a; margin-bottom: 2px; }
  .menu-desc { font-size: 12px; color: #94a3b8; }
  .menu-arrow {
    width: 28px; height: 28px;
    background: #f1f5f9;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* Tab Bar */
  .tabbar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 390px;
    background: #fff;
    border-top: 1px solid #f1f5f9;
    display: flex;
    padding: 8px 0 20px;
    z-index: 100;
    box-shadow: 0 -2px 12px rgba(0,0,0,.06);
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    text-decoration: none;
  }
  .tab-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .tab-label { font-size: 10px; font-weight: 500; color: #94a3b8; }
  .tab-item.active .tab-label { color: #2563eb; }
  .tab-item.active .tab-icon svg { stroke: #2563eb; }
  .tab-item .tab-icon svg { stroke: #94a3b8; }
</style>
</head>

        </svg>
      </div>
      <span class="tab-label">我的</span>
    </a>
  </div>

</div>

<script>
  function toggleDetail() {
    var row = document.getElementById('expandRow');
    var panel = document.getElementById('detailPanel');
    row.classList.toggle('open');
    panel.classList.toggle('open');
  }
  function switchTab(tab) {
    var bars = document.getElementById('panelBars');
    var radar = document.getElementById('panelRadar');
    var btnBars = document.getElementById('tabBars');
    var btnRadar = document.getElementById('tabRadar');
    if (tab === 'bars') {
      bars.style.display = 'block';
      radar.style.display = 'none';
      btnBars.classList.add('active');
      btnRadar.classList.remove('active');
    } else {
      bars.style.display = 'none';
      radar.style.display = 'block';
      btnBars.classList.remove('active');
      btnRadar.classList.add('active');
    }
  }
</script>
</body>
