<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>职信通 - 信用报告（空）</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #f6f8fc;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .phone {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: #f6f8fc;
    position: relative;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f2460 0%, #1e40af 50%, #2563eb 100%);
    padding: 52px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.72);
    position: relative;
    z-index: 1;
  }

  .content {
    padding: 0 16px 16px;
    margin-top: -12px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.07);
    margin-bottom: 14px;
  }

  /* Empty State */
  .empty-card {
    padding: 40px 24px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .empty-icon-wrap {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #dbeafe, #bfdbfe);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .empty-title {
    font-size: 18px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 8px;
  }
  .empty-desc {
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.7;
    margin-bottom: 24px;
    max-width: 240px;
  }

  /* Use case cards */
  .usecase-row {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    width: 100%;
  }
  .usecase-item {
    flex: 1;
    background: #f8fafc;
    border-radius: 12px;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .usecase-emoji { font-size: 22px; }
  .usecase-label { font-size: 11px; color: #475569; font-weight: 600; text-align: center; line-height: 1.3; }

  /* CTA button */
  .btn-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 52px;
    background: linear-gradient(135deg, #1e40af, #2563eb);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.88; }
  .price-tag {
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 2px 8px;
    font-size: 13px;
    font-weight: 700;
  }

  /* Sample report row */
  .sample-row {
    display: flex;
    align-items: center;
    padding: 18px 20px;
    gap: 14px;
    text-decoration: none;
    cursor: pointer;
  }
  .sample-icon {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, #ede9fe, #ddd6fe);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sample-text { flex: 1; }
  .sample-title { font-size: 15px; font-weight: 600; color: #0f172a; margin-bottom: 2px; }
  .sample-desc { font-size: 12px; color: #94a3b8; }
  .sample-arrow {
    width: 28px; height: 28px;
    background: #f1f5f9;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  /* Tab Bar */
  .tabbar {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 390px;
    background: #fff;
    border-top: 1px solid #f1f5f9;
    display: flex;
    padding: 8px 0 20px;
    z-index: 100;
    box-shadow: 0 -2px 12px rgba(0,0,0,.06);
  }
  .tab-item {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    cursor: pointer; text-decoration: none;
  }
  .tab-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .tab-label { font-size: 10px; font-weight: 500; color: #94a3b8; }
  .tab-item.active .tab-label { color: #2563eb; }
  .tab-item.active .tab-icon svg { stroke: #2563eb; }
  .tab-item .tab-icon svg { stroke: #94a3b8; }
</style>
</head>
<body>

  <!-- Tab Bar -->

        </svg>

          <polyline points="14 2 14 8 20 8"/>

    <a href="12-resume-empty.html" class="tab-item">
